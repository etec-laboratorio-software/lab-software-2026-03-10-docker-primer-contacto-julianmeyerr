services:
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb
    restart: "no"
    environment:
      MONGO_INITDB_DATABASE: ecommerce
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: ecommerce-backend
    restart: "no"
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongodb:27017/ecommerce
      JWT_SECRET: clave_secreta_super_segura_cambiar_en_produccion
      JWT_EXPIRES_IN: 1d
      SALT_ROUNDS: 10
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: ecommerce-frontend
    restart: "no"
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network

volumes:
  mongodb_data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
